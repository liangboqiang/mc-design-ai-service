<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图谱百科 · NoteGraph Console</title>
    <style>
:root {
  --背景: #eef2f7;
  --深底: #0b1120;
  --深底2: #111827;
  --面板: rgba(255,255,255,.92);
  --玻璃: rgba(255,255,255,.72);
  --墨色: #111827;
  --正文: #334155;
  --弱字: #64748b;
  --边框: rgba(148,163,184,.28);
  --主色: #2563eb;
  --主色深: #1d4ed8;
  --青色: #06b6d4;
  --紫色: #8b5cf6;
  --绿色: #22c55e;
  --橙色: #f59e0b;
  --红色: #ef4444;
  --阴影: 0 18px 46px rgba(15,23,42,.09);
  --重阴影: 0 26px 80px rgba(15,23,42,.16);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "微软雅黑", sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; color: var(--墨色); background: radial-gradient(circle at 16% -8%, #dbeafe 0, transparent 32rem), radial-gradient(circle at 92% 8%, #ddd6fe 0, transparent 28rem), linear-gradient(180deg, #f8fafc, #edf2f7); }
a { color: inherit; text-decoration: none; }
button, input, textarea, select { font: inherit; }
input, textarea, select { width: 100%; border: 1px solid var(--边框); border-radius: 16px; padding: 11px 13px; outline: none; background: rgba(255,255,255,.94); color: var(--墨色); transition: .16s ease; }
input:focus, textarea:focus, select:focus { border-color: rgba(37,99,235,.45); box-shadow: 0 0 0 4px rgba(37,99,235,.11); }
pre { background: #0f172a; color: #dbeafe; border-radius: 18px; padding: 14px; overflow: auto; max-height: 460px; line-height: 1.58; border: 1px solid rgba(255,255,255,.08); }
code { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 9px; padding: 2px 7px; color: #1e293b; }
.应用壳 { min-height: 100vh; display: grid; grid-template-columns: 258px minmax(0, 1fr); }
.侧栏 { position: sticky; top: 0; height: 100vh; padding: 18px 14px; background: linear-gradient(180deg, rgba(15,23,42,.96), rgba(17,24,39,.94)); color: #e5e7eb; border-right: 1px solid rgba(255,255,255,.08); overflow: auto; }
.品牌 { display: flex; align-items: center; gap: 12px; padding: 9px; margin-bottom: 18px; cursor: pointer; border-radius: 18px; }
.品牌:hover { background: rgba(255,255,255,.06); }
.品牌标记 { width: 44px; height: 44px; display: grid; place-items: center; border-radius: 18px; color: #fff; font-weight: 950; background: conic-gradient(from 210deg, #22d3ee, #2563eb, #8b5cf6, #22d3ee); box-shadow: 0 16px 36px rgba(59,130,246,.32); }
.品牌 strong { display: block; letter-spacing: -.04em; font-size: 17px; }
.品牌 span { display: block; margin-top: 2px; font-size: 12px; color: #94a3b8; }
.侧栏 nav { display: grid; gap: 9px; }
.侧栏 nav a { display: grid; grid-template-columns: 32px minmax(0,1fr); gap: 2px 10px; padding: 12px; border-radius: 17px; color: #cbd5e1; border: 1px solid transparent; }
.侧栏 nav a i { grid-row: span 2; display: grid; place-items: center; width: 32px; height: 32px; border-radius: 12px; background: rgba(255,255,255,.07); font-style: normal; color: #93c5fd; }
.侧栏 nav a b { font-size: 14px; align-self: end; }
.侧栏 nav a small { font-size: 11px; color: #94a3b8; align-self: start; }
.侧栏 nav a:hover, .侧栏 nav a.激活 { background: rgba(37,99,235,.18); color: #fff; border-color: rgba(147,197,253,.25); }
.侧栏 nav a.激活 i { background: linear-gradient(135deg, #2563eb, #8b5cf6); color: white; }
.侧栏说明 { margin-top: 18px; padding: 13px; border-radius: 17px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); display: grid; gap: 6px; }
.侧栏说明 b { font-size: 13px; color: #fff; }
.侧栏说明 span { color: #94a3b8; font-size: 12px; line-height: 1.55; }
.主区 { min-width: 0; padding: 20px 22px 40px; }
.顶栏 { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; padding: 18px 4px 18px; margin-bottom: 16px; }
.路径标识 { display: inline-flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 999px; background: rgba(37,99,235,.08); color: #1d4ed8; font-size: 12px; font-weight: 900; margin-bottom: 8px; }
.顶栏 h1 { margin: 0 0 5px; font-size: 32px; letter-spacing: -.06em; line-height: 1.04; }
.顶栏 p { margin: 0; color: var(--弱字); line-height: 1.6; max-width: 900px; }
.内容网格 { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
.内容网格.单栏 { grid-template-columns: minmax(0, 1fr); }
.主要内容 { min-width: 0; display: grid; gap: 16px; }
.右栏 { position: sticky; top: 16px; display: grid; gap: 12px; max-height: calc(100vh - 32px); overflow: auto; }
.侧卡, .检索头, .图谱面板, .百科结果, .Note标题, .Note正文, .Note目录, .Note治理, .下方标签, .仓库列表, .仓库主体, .治理总览, .问题列表, .问题详情, .指标, .知识卡片 { background: var(--面板); border: 1px solid rgba(148,163,184,.24); border-radius: 24px; box-shadow: var(--阴影); backdrop-filter: blur(18px); }
.检索头, .侧卡, .百科结果, .Note标题, .Note正文, .Note目录, .Note治理, .下方标签, .仓库列表, .仓库主体, .治理总览, .问题列表, .问题详情 { padding: 17px; }
.搜索框 { display: grid; grid-template-columns: minmax(0, 1fr) 132px; gap: 12px; margin-bottom: 14px; }
.搜索框 input { min-height: 56px; font-size: 16px; border-radius: 20px; background: #fff; box-shadow: inset 0 1px 0 rgba(15,23,42,.02); }
.词条栏 { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
.词条下拉 { position: relative; }
.词条下拉 summary { list-style: none; cursor: pointer; border: 1px solid rgba(148,163,184,.28); background: linear-gradient(180deg,#fff,#f8fafc); color: #334155; border-radius: 999px; padding: 9px 13px; font-size: 12px; font-weight: 900; box-shadow: 0 8px 20px rgba(15,23,42,.05); }
.词条下拉 summary em { color: #2563eb; font-style: normal; }
.词条下拉 summary::-webkit-details-marker { display: none; }
.词条面板 { position: absolute; left: 0; top: 39px; z-index: 30; width: 250px; max-height: 330px; overflow: auto; padding: 10px; border-radius: 18px; background: rgba(255,255,255,.98); border: 1px solid rgba(148,163,184,.32); box-shadow: var(--重阴影); display: grid; gap: 7px; }
.词条选项 { border: 0; background: transparent; color: #334155; border-radius: 12px; padding: 8px 9px; display: flex; align-items: center; gap: 8px; cursor: pointer; text-align: left; }
.词条选项 span { width: 20px; height: 20px; display: grid; place-items: center; border-radius: 7px; background: #f1f5f9; color: #64748b; }
.词条选项:hover, .词条选项.选中 { background: #eff6ff; color: #1d4ed8; }
.词条选项.选中 span { background: #2563eb; color: white; }
.已激活词条 { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; color: var(--弱字); font-size: 12px; }
.已激活词条 button, .标签 { border: 1px solid #bfdbfe; background: #eff6ff; color: #1d4ed8; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 900; }
.标签.类型 { background: #eef2ff; color: #3730a3; border-color: #c7d2fe; }
.标签.状态 { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
.标签.成熟度 { background: #fef3c7; color: #92400e; border-color: #fde68a; }
.图谱百科布局 { display: grid; grid-template-columns: minmax(0, 1.28fr) minmax(350px, .72fr); gap: 16px; align-items: stretch; }
.图谱面板 { min-height: 660px; padding: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); overflow: hidden; background: linear-gradient(180deg, #0f172a, #111827); border-color: rgba(255,255,255,.1); box-shadow: 0 28px 90px rgba(15,23,42,.22); }
.图谱工具条 { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: #cbd5e1; font-size: 12px; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.08); background: linear-gradient(90deg, rgba(37,99,235,.16), rgba(139,92,246,.1)); }
.图谱工具条 b { display: block; color: #fff; font-size: 14px; }
.图谱工具条 span { display: block; margin-top: 2px; color: #94a3b8; }
.开源图谱画布 { min-height: 600px; border-radius: 0; background: radial-gradient(circle at 34% 20%, rgba(37,99,235,.32), transparent 18rem), radial-gradient(circle at 78% 35%, rgba(139,92,246,.24), transparent 22rem), linear-gradient(135deg, #07111f, #111827 46%, #0b1120); overflow: hidden; position: relative; }
.开源图谱画布::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(148,163,184,.06) 1px, transparent 1px), linear-gradient(90deg, rgba(148,163,184,.06) 1px, transparent 1px); background-size: 34px 34px; pointer-events: none; }
.图谱后备 { height: 100%; background: transparent; box-shadow: none; border: 0; }
.图谱后备 svg { width: 100%; height: 100%; min-height: 600px; display: block; }
.声明边, .候选边, .弱边, .运行边, .推断边 { fill: none; }
.声明边 { stroke: rgba(148,163,184,.62); stroke-width: 1.45; opacity: .76; }
.弱边 { stroke: rgba(148,163,184,.28); stroke-width: 1; stroke-dasharray: 5 6; opacity: .26; }
.运行边 { stroke: #22d3ee; stroke-width: 2.5; opacity: .95; filter: url(#glow); }
.推断边 { stroke: #a78bfa; stroke-width: 1.6; stroke-dasharray: 2 5; opacity: .82; }
.候选边 { stroke: #f59e0b; stroke-width: 1.6; stroke-dasharray: 8 6; opacity: .88; }
.后备节点 { cursor: pointer; }
.后备节点 circle { stroke: rgba(255,255,255,.85); stroke-width: 2.6; filter: url(#glow); }
.后备节点 text { font-size: 12px; text-anchor: middle; fill: #e5e7eb; paint-order: stroke; stroke: #0f172a; stroke-width: 4px; stroke-linejoin: round; }
.后备节点.agent circle { fill: #8b5cf6; }
.后备节点.skill circle { fill: #06b6d4; }
.后备节点.tool circle { fill: #f59e0b; }
.后备节点.part circle { fill: #22c55e; }
.后备节点.rule circle { fill: #64748b; }
.后备节点.document circle { fill: #0ea5e9; }
.后备节点.note circle { fill: #3b82f6; }
.百科结果 { max-height: 760px; overflow: auto; display: grid; align-content: start; gap: 11px; }
.区块标题 { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 11px; }
.区块标题 h3 { margin: 0; letter-spacing: -.03em; }
.区块标题 span { color: var(--弱字); font-size: 12px; font-weight: 900; }
.知识卡片 { padding: 14px; display: grid; gap: 9px; box-shadow: none; cursor: pointer; transition: .16s ease; background: linear-gradient(180deg,#fff,#fbfdff); }
.知识卡片:hover { border-color: #93c5fd; transform: translateY(-2px); box-shadow: 0 16px 38px rgba(37,99,235,.11); }
.卡片头 { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
.卡片头 strong { letter-spacing: -.025em; }
.知识卡片 p { margin: 0; color: #475569; line-height: 1.58; }
.卡片脚 { display: flex; justify-content: space-between; gap: 8px; color: var(--弱字); font-size: 12px; align-items: center; }
.侧卡 { display: grid; gap: 11px; }
.侧卡 h3, .侧卡 h4 { margin: 0; letter-spacing: -.03em; }
.侧卡 p { margin: 0; color: var(--弱字); line-height: 1.68; }
.节点详情卡 { display: grid; grid-template-columns: 54px minmax(0,1fr); gap: 12px; align-items: center; }
.节点详情卡 h3 { margin: 0 0 4px; }
.节点徽标 { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 20px; color: #fff; font-weight: 950; background: #3b82f6; box-shadow: 0 16px 34px rgba(59,130,246,.24); }
.节点徽标.agent { background: #8b5cf6; } .节点徽标.skill { background: #06b6d4; } .节点徽标.tool { background: #f59e0b; } .节点徽标.part { background: #22c55e; } .节点徽标.document { background: #0ea5e9; } .节点徽标.rule { background: #64748b; }
.节点操作 { display: flex; gap: 8px; flex-wrap: wrap; }
.指标网格 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.指标 { padding: 13px; display: grid; gap: 4px; box-shadow: none; background: linear-gradient(180deg,#fff,#f8fafc); }
.指标 span { color: var(--弱字); font-size: 12px; font-weight: 900; }
.指标 b { font-size: 24px; letter-spacing: -.05em; overflow: hidden; text-overflow: ellipsis; }
.指标 small { color: var(--弱字); }
.小项, .字段项 { border: 1px solid var(--边框); background: #f8fafc; border-radius: 16px; padding: 11px; display: grid; gap: 5px; margin-bottom: 8px; }
.小项 b, .字段项 span { font-size: 13px; }
.小项 span, .字段项 small { color: var(--弱字); font-size: 12px; overflow-wrap: anywhere; }
.按钮 { border: 0; border-radius: 14px; padding: 10px 14px; font-weight: 900; display: inline-flex; justify-content: center; align-items: center; gap: 7px; cursor: pointer; transition: .14s ease; }
.按钮.主要 { background: linear-gradient(135deg, #2563eb, #4f46e5); color: #fff; box-shadow: 0 12px 24px rgba(37,99,235,.22); }
.按钮.主要:hover { transform: translateY(-1px); box-shadow: 0 16px 32px rgba(37,99,235,.28); }
.按钮.次要 { background: #eef2ff; color: #1e40af; }
.按钮.次要:hover { background: #dbeafe; }
.按钮.幽灵 { background: rgba(255,255,255,.1); color: inherit; border: 1px solid rgba(148,163,184,.26); }
.图谱工具条 .按钮.幽灵 { color: #dbeafe; border-color: rgba(255,255,255,.18); }
.按钮.幽灵:hover { background: rgba(255,255,255,.16); }
.按钮.小 { padding: 6px 9px; font-size: 12px; background: #f1f5f9; color: #334155; border: 1px solid var(--边框); }
.按钮.满宽 { width: 100%; }
.操作组, .标签行 { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.Note标题 { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; }
.Note标题 h2 { margin: 0 0 6px; font-size: 32px; letter-spacing: -.055em; }
.详情摘要 { display: grid; gap: 9px; }
.Note详情布局 { display: grid; grid-template-columns: 178px minmax(0, 1fr) 300px; gap: 16px; align-items: start; }
.Note目录 { position: sticky; top: 16px; display: grid; gap: 8px; box-shadow: none; }
.Note目录 a { padding: 10px 11px; border-radius: 13px; color: var(--正文); font-weight: 850; }
.Note目录 a:hover { background: #eff6ff; color: var(--主色); }
.Note正文 { min-height: 72vh; }
.Note阅读区 { max-width: 900px; margin: 0 auto; line-height: 1.84; color: #263244; }
.Note阅读区 h1, .Note阅读区 h2, .Note阅读区 h3 { letter-spacing: -.045em; margin: 1.28em 0 .58em; color: #0f172a; }
.Note阅读区 h1 { font-size: 30px; }
.Note阅读区 h2 { font-size: 24px; border-bottom: 1px solid #e2e8f0; padding-bottom: 7px; }
.Note阅读区 p { margin: 0 0 .8em; }
.列表项 { padding-left: 12px; }
.note跳转 { color: var(--主色); font-weight: 900; border-bottom: 1px dotted var(--主色); }
.源码编辑 { width: 100%; min-height: 72vh; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Microsoft YaHei Mono", monospace; line-height: 1.56; background: #0f172a; color: #dbeafe; }
.Note治理 { display: grid; gap: 10px; }
.小图谱 { min-height: 220px; border: 1px solid rgba(148,163,184,.22); border-radius: 18px; background: #0f172a; overflow: hidden; }
.小图谱 .开源图谱画布, #小图谱 { min-height: 220px; }
.下方标签 { display: grid; gap: 10px; }
.下方标签 details { border: 1px solid var(--边框); border-radius: 18px; padding: 11px; background: #fff; }
.下方标签 summary { cursor: pointer; font-weight: 900; }
.行 { display: grid; grid-template-columns: minmax(0, 1fr) 180px auto; gap: 10px; align-items: center; padding: 11px; border-bottom: 1px solid #edf2f7; }
.行 span { color: var(--弱字); font-size: 12px; }
.仓库布局 { display: grid; grid-template-columns: 310px minmax(0, 1fr); gap: 16px; }
.仓库列表 { display: grid; gap: 10px; align-content: start; }
.仓库卡 { text-align: left; border: 1px solid var(--边框); background: #fff; border-radius: 18px; padding: 13px; display: grid; gap: 6px; cursor: pointer; transition: .15s ease; }
.仓库卡:hover { transform: translateY(-1px); border-color: #93c5fd; }
.仓库卡.选中 { border-color: #93c5fd; background: linear-gradient(180deg,#eff6ff,#fff); color: var(--主色); box-shadow: 0 14px 32px rgba(37,99,235,.09); }
.仓库卡 span, .仓库卡 small { color: var(--弱字); font-size: 12px; overflow-wrap: anywhere; }
.仓库主体 { display: grid; gap: 16px; }
.仓库表单 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--边框); }
.仓库表单 label { display: grid; gap: 7px; font-size: 12px; color: var(--弱字); font-weight: 900; }
.文件管理 { display: grid; gap: 11px; }
.文件列表 { display: grid; gap: 9px; }
.文件行 { display: grid; grid-template-columns: 34px minmax(0, 1fr) 220px auto; gap: 10px; align-items: center; border: 1px solid var(--边框); background: #fff; border-radius: 16px; padding: 11px; cursor: pointer; transition: .14s ease; }
.文件行:hover { border-color: #93c5fd; background: #f8fbff; transform: translateY(-1px); }
.文件行 small { color: var(--弱字); }
.治理布局 { display: grid; grid-template-columns: 390px minmax(0, 1fr); gap: 16px; }
.问题列表 { display: grid; gap: 10px; max-height: 76vh; overflow: auto; align-content: start; }
.问题卡 { text-align: left; border: 1px solid var(--边框); border-radius: 18px; padding: 13px; display: grid; gap: 6px; background: #fff; cursor: pointer; transition: .14s ease; }
.问题卡:hover { transform: translateY(-1px); box-shadow: 0 14px 32px rgba(15,23,42,.08); }
.问题卡.high { border-color: #fecaca; background: linear-gradient(180deg,#fff7f7,#fff); }
.问题卡.normal { border-color: #fed7aa; background: linear-gradient(180deg,#fffaf0,#fff); }
.问题卡.low { border-color: #bae6fd; background: linear-gradient(180deg,#f0f9ff,#fff); }
.问题卡 span, .问题卡 small { color: var(--弱字); font-size: 12px; line-height: 1.48; }
.问题详情 { min-height: 540px; }
.空状态, .加载, .错误 { padding: 32px; border-radius: 22px; background: rgba(255,255,255,.86); border: 1px dashed var(--边框); color: var(--弱字); text-align: center; display: grid; gap: 8px; place-items: center; }
.空状态 span { font-size: 28px; color: #94a3b8; }
.加载点 { width: 34px; height: 34px; border-radius: 50%; border: 3px solid #dbeafe; border-top-color: #2563eb; animation: 旋转 .8s linear infinite; }
@keyframes 旋转 { to { transform: rotate(360deg); } }
.错误 { color: #991b1b; border-color: #fecaca; }
.提示 { position: fixed; right: 18px; bottom: 18px; background: #0f172a; color: #fff; padding: 13px 15px; border-radius: 16px; box-shadow: var(--重阴影); z-index: 60; }
.隐藏 { display: none !important; }
@media (max-width: 1260px) {
  .应用壳 { grid-template-columns: 1fr; }
  .侧栏 { position: static; height: auto; }
  .侧栏 nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .内容网格, .图谱百科布局, .Note详情布局, .仓库布局, .治理布局 { grid-template-columns: 1fr; }
  .右栏, .Note目录 { position: static; max-height: none; }
}
@media (max-width: 760px) {
  .主区 { padding: 12px; }
  .顶栏, .Note标题 { display: grid; }
  .侧栏 nav { grid-template-columns: 1fr; }
  .搜索框, .仓库表单, .文件行, .行 { grid-template-columns: 1fr; }
  .开源图谱画布 { min-height: 460px; }
  .图谱面板 { min-height: 520px; }
}

/* 图谱百科 v2：力导向激活视图 */
.图谱检索台 { background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(248,250,252,.94)); border-radius: 28px; }
.搜索说明 { margin: -5px 0 12px; color: var(--弱字); font-size: 12px; font-weight: 800; }

function 取节点类别(kind) {
  const k = String(kind || 'Note').toLowerCase();
  if (k.includes('agent')) return 'agent';
  if (k.includes('skill')) return 'skill';
  if (k.includes('tool')) return 'tool';
  if (k.includes('workflow')) return 'workflow';
  if (k.includes('part')) return 'part';
  if (k.includes('rule') || k.includes('policy')) return 'rule';
  if (k.includes('document') || k.includes('case') || k.includes('sop')) return 'document';
  return 'note';
}
function 图谱渲染状态() {
  if (window.NoteGraphForce && window.NoteGraphForce.mount) {
    状态.图谱库状态 = '离线高质量力导向图谱已启用';
    return true;
  }
  状态.图谱库状态 = '离线图谱组件未加载';
  return false;
}
function G6节点样式(kind, small = false) {
  const type = 取节点类别(kind);
  const table = {
    agent: ['#8b5cf6', '#ddd6fe', 50], skill: ['#06b6d4', '#cffafe', 42], tool: ['#f59e0b', '#fde68a', 46], workflow: ['#fb7185', '#ffe4e6', 44], part: ['#10b981', '#bbf7d0', 48], rule: ['#64748b', '#e2e8f0', 40], document: ['#38bdf8', '#dbeafe', 38], note: ['#3b82f6', '#bfdbfe', 36],
  };
  const [fill, stroke, size] = table[type] || table.note;
  return { size: small ? Math.max(20, size - 14) : size, style: { fill, stroke } };
}
function G6图谱数据(graph, limit = 220, small = false) {
  const sortedNodes = [...(graph.nodes || [])]
    .sort((a, b) => String(a.kind || '').localeCompare(String(b.kind || '')) || String(a.id).localeCompare(String(b.id)))
    .slice(0, limit);
  const nodeIds = new Set(sortedNodes.map((n) => n.id));
  const edgeSource = graph.visible_edges && graph.visible_edges.length ? graph.visible_edges : graph.edges || [];
  const edges = edgeSource.filter((e) => nodeIds.has(e.source) && nodeIds.has(e.target)).slice(0, limit * 2);
  return { ...graph, nodes: sortedNodes, edges, visible_edges: edges };
}
function 开源图谱加载失败(dom) {
  dom.innerHTML = `<div class="开源图谱失败"><b>离线图谱组件未加载</b><p>请确认 <code>assets/graphin_offline.js</code> 已包含在 <code>web/src/manifest.json</code> 中，并重新执行 <code>python scripts/build_web.py</code>。</p></div>`;
}
async function 挂载图谱(domId, graph, options = {}) {
  const dom = 取(domId);
  if (!dom) return;
  const ok = 图谱渲染状态();
  dom.innerHTML = '';
  if (!ok || !window.NoteGraphForce || !window.NoteGraphForce.mount) {
    开源图谱加载失败(dom);
    return;
  }
  if (状态.图谱实例表[domId]) { try { 状态.图谱实例表[domId].destroy(); } catch (e) { /* ignore */ } }
  const data = G6图谱数据(graph, options.limit || 220, !!options.small);
  const inst = window.NoteGraphForce.mount(dom, data, {

  状态.图谱实例表[domId] = inst;
  if (domId === '主图谱') 状态.图谱实例 = inst;

}

function 渲染Markdown(md) {
  const lines = String(md || '').split('\n');
  return lines.map((line) => {
    if (/^###\s+/.test(line)) return `<h3>${转义(line.replace(/^###\s+/, ''))}</h3>`;
    if (/^##\s+/.test(line)) return `<h2>${转义(line.replace(/^##\s+/, ''))}</h2>`;
    if (/^#\s+/.test(line)) return `<h1>${转义(line.replace(/^#\s+/, ''))}</h1>`;
    if (/^[-*]\s+/.test(line)) return `<p class="列表项">• ${转义(line.replace(/^[-*]\s+/, ''))}</p>`;
    if (!line.trim()) return '<br/>';
    const html = 转义(line).replace(/\[\[([^\]]+)\]\]/g, (_, id) => `<a class="note跳转" href="${note链接(id)}">${转义(id)}</a>`);
    return `<p>${html}</p>`;
  }).join('');
}

Files}</div></div></section></section></section>`;
  const side = `<section class="侧卡"><h3>详情摘要</h3><p>记事本只是组织入口；每个笔记仍然以 note.md 详情页为主，可在详情页完成编辑、审核、版本回溯和小型图谱跳转。</p>${指标('笔记数', nb.note_count || 0)}${指标('源文件', (nb.source_files || []).length)}${指标('软模式', nb.soft_schema_id || '无')}</section><section class="侧卡"><h3>当前软模式</h3><button class="按钮 次要 满宽" onclick="发现当前笔记本字段()">从当前记事本增量发现字段</button><div id="模式摘要"></div></section>`;
  状态.当前模式 = nb.soft_schema_id || 状态.当前模式;
  渲染外壳(main, side);
  const upload = 取('笔记本源上传');
  if (upload) upload.onchange = 上传笔记本源文件;
  await 渲染模式摘要();
}
window.选择笔记本 = (id) => { 状态.当前仓库 = id; 渲染记事本(); };
window.新建笔记本 = async () => { const id = prompt('请输入记事本 ID，例如 notebook.connecting_rod'); if (!id) return; await api.notebook.save({ notebook_id: id, name: id, notebook_type: 'team', path: `data/notes/custom/${id.replaceAll('.', '_')}`, note_kind: 'Document', soft_schema_id: 'schema.business_document', extraction_rule_id: 'rule.default', source_path: `data/workbench/team/notebooks/${id.replaceAll('.', '_')}/sources`, icon: '📒' }); 状态.当前仓库 = id; 渲染记事本(); };
window.保存当前笔记本 = async () => { const nb = { notebook_id: 状态.当前仓库, name: 取('笔记本名称').value, path: 取('笔记本路径').value, note_kind: 取('笔记类型').value, notebook_type: 取('笔记本类型').value, source_path: 取('源文件路径').value, soft_schema_id: 取('笔记本模式')?.value || '', extraction_rule_id: 取('笔记本规则').value, icon: 取('笔记本图标').value || '📒' }; await api.notebook.save(nb); 提示('记事本已保存'); 渲染记事本(); };
window.触发笔记本上传 = () => 取('笔记本源上传').click();
async function 上传笔记本源文件(e) { const files = [...(e.target.files || [])]; if (!files.length) return; const data = await api.notebook.read(状态.当前仓库); const nb = data.notebook || {}; const loc = 笔记本源定位(nb); const rows = await Promise.all(files.map(async (file) => ({ name: file.name, relative_path: file.webkitRelativePath || file.name, content: await file.text() }))); await api.workspace.upload(loc.scope, loc.base, rows); 提示(`已上传 ${rows.length} 个源文件`); 渲染记事本(); }
window.新建笔记本文件夹 = async () => { const name = prompt('新建源文件夹名称'); if (!name) return; const data = await api.notebook.read(状态.当前仓库); const nb = data.notebook || {}; const loc = 笔记本源定位(nb); await api.workspace.mkdir(loc.scope, [loc.base, name].filter(Boolean).join('/')); 渲染记事本(); };
window.打开笔记本源文件 = async (notebookId, itemPath) => { const data = await api.notebook.read(notebookId); const nb = data.notebook || {}; const loc = 笔记本源定位(nb); const full = 笔记本文件路径(nb, itemPath); const payload = await api.workspace.read(loc.scope, full); const content = prompt(`编辑源文件：${itemPath}`, payload.content || ''); if (content !== null) { await api.workspace.write(loc.scope, full, content); 提示('源文件已保存'); 渲染记事本(); } };
window.从笔记本文件生成Note = async (notebookId, itemPath) => { const data = await api.notebook.read(notebookId); const nb = data.notebook || {}; const loc = 笔记本源定位(nb); const full = 笔记本文件路径(nb, itemPath); await api.note.fromFile(loc.scope, full, nb.note_kind || 'Document', 'proposal'); 提示('已从源文件生成 note 候选'); };
window.发现当前笔记本字段 = async () => { const data = await api.notebook.read(状态.当前仓库); const nb = data.notebook || {}; const schema = nb.soft_schema_id || 状态.当前模式; if (!schema) return 提示('用户临时记事本不绑定软模式'); 状态.当前模式 = schema; await api.schema.discover(schema, 状态.当前仓库); 提示('已从当前记事本增量发现字段'); 渲染模式摘要(); };

async function 渲染审核治理() {
  加载('正在执行健康检查...');
  const [dashboard, issues] = await Promise.all([api.governance.dashboard().catch(() => ({})), api.governance.issues().catch(() => ({ issues: [] }))]);
  const rows = issues.issues || [];
  const main = `<section class="治理总览"><div class="指标网格">${指标('待审核', dashboard.proposals?.candidate || 0)}${指标('冲突项', dashboard.conflicts?.count || 0)}${指标('诊断问题', dashboard.graph?.diagnostics || rows.length)}${指标('图谱节点', dashboard.graph?.nodes || 0)}</div></section><section class="治理布局"><aside class="问题列表">${rows.map((x) => `<button class="问题卡 ${x.severity}" onclick="查看问题('${转义(x.issue_id)}')"><b>${转义(x.title)}</b><span>${转义(截断(x.summary, 120))}</span><small>${转义(x.code)} · ${转义(x.risk_level)}</small></button>`).join('') || 空状态('暂无健康问题')}</aside><section class="问题详情" id="问题详情"><h3>问题摘要</h3><p>选择左侧问题节点查看摘要、Diff、影响分析和修复建议。</p></section></section>`;
  const side = `<section class="侧卡"><h3>批量治理</h3><p>低风险项可按建议批量处理；涉及 note_id、执行器、删除、回退的高风险项必须逐项确认。</p><button class="按钮 主要 满宽" onclick="批量接受候选()">批量接受候选</button><button class="按钮 次要 满宽" onclick="全量重建图谱()">重新健康检查</button></section><section class="侧卡"><h3>版本状态</h3><pre>${JSON文本(dashboard.version || {})}</pre></section>`;
  渲染外壳(main, side);
  window.__当前问题 = rows;
}
window.查看问题 = async (issueId) => { const issue = (window.__当前问题 || []).find((x) => x.issue_id === issueId) || {}; const box = 取('问题详情'); if (!box) return; let proposalDetail = ''; if (issue.kind === 'proposal' && issue.issue_id?.startsWith('proposal:')) { const pid = issue.issue_id.split(':')[1]; try { const data = await api.governance.proposal(pid); proposalDetail = `<h4>Diff 预览</h4><pre>${JSON文本(data.diff || {})}</pre><h4>影响分析</h4><pre>${JSON文本(data.impact || {})}</pre>`; } catch (e) { proposalDetail = `<p>${转义(e.message)}</p>`; } } box.innerHTML = `<h3>${转义(issue.title || '健康问题')}</h3><p>${转义(issue.summary || '')}</p><div class="标签行">${标签(issue.severity, '状态')}${标签(issue.risk_level, '成熟度')}${标签(issue.kind, '类型')}</div><h4>修复建议</h4><p>${转义(issue.suggestion || '查看详情后生成修复 Proposal。')}</p><div class="操作组"><button class="按钮 主要" onclick="智能修复('${转义(issue.issue_id)}')">按建议智能处理</button>${issue.note_id ? `<button class="按钮 次要" onclick="跳转('${note链接(issue.note_id)}')">打开笔记</button>` : ''}</div>${proposalDetail}<h4>原始问题</h4><pre>${JSON文本(issue.details || issue)}</pre>`; };
window.智能修复 = async (issueId) => { const mode = confirm('是否直接接受/应用可处理候选？取消则仅生成修复建议。') ? 'accept' : 'proposal'; const res = await api.governance.applyFix(issueId, mode); 提示(res.status === 'accepted' ? '已按建议接受候选' : '已生成修复建议'); 渲染审核治理(); };
window.批量接受候选 = async () => { const rows = (window.__当前问题 || []).filter((x) => x.kind === 'proposal' && x.issue_id.startsWith('proposal:')).map((x) => x.issue_id.split(':')[1]); if (!rows.length) return 提示('没有可批量接受的候选'); await api.governance.review(rows, 'accepted', '低风险批量接受'); 提示(`已接受 ${rows.length} 个候选`); 渲染审核治理(); };

async function renderCurrent() {
  try {
    const h = location.hash || '#/';
    if (h.startsWith('#/note')) return 渲染笔记详情();
    if (h.startsWith('#/repo')) return 渲染记事本();
    if (h.startsWith('#/governance')) return 渲染审核治理();
    return 渲染图谱百科();
  } catch (err) {
    console.error(err);
    渲染外壳(`<div class="错误"><h2>页面错误</h2><p>${转义(err.message || err)}</p><button class="按钮 主要" onclick="renderCurrent()">重试</button></div>`);
  }
}
window.renderCurrent = renderCurrent;
window.addEventListener('hashchange', renderCurrent);
renderCurrent();
