<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki Workbench</title>
    <style>
:root {
  --bg: #f7f9fc;
  --panel: #ffffff;
  --panel-2: #f8fafc;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --primary: #2563eb;
  --primary-2: #1d4ed8;
  --danger: #dc2626;
  --ok: #16a34a;
  --warn: #d97706;
  --shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(37,99,235,.10), transparent 36%),
    linear-gradient(180deg, #f8fafc, #eef2f7);
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
.app-shell { min-height: 100vh; display: grid; grid-template-columns: 280px minmax(0, 1fr); }
.sidebar {
  position: sticky; top: 0; height: 100vh; padding: 22px;
  border-right: 1px solid var(--border); background: rgba(255,255,255,.72); backdrop-filter: blur(18px);
}
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
.logo {
  width: 42px; height: 42px; border-radius: 16px; color: white; display: grid; place-items: center; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), #7c3aed);
  box-shadow: 0 14px 30px rgba(37, 99, 235, .26);
}
.brand strong { display: block; font-size: 18px; }
.brand span { color: var(--muted); font-size: 12px; }
nav { display: grid; gap: 8px; }
nav a {
  padding: 11px 12px; border-radius: 14px; color: #334155; font-weight: 650; transition: .15s ease;
}
nav a:hover, nav a.active { background: #eff6ff; color: var(--primary); }
.sidebar-note { position: absolute; left: 22px; right: 22px; bottom: 22px; display: grid; gap: 8px; color: var(--muted); font-size: 12px; }
code { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 3px 7px; border-radius: 8px; }
.main { padding: 28px; min-width: 0; }
.topbar {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
  padding: 22px 26px; background: rgba(255,255,255,.82); border: 1px solid var(--border); border-radius: 28px; box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.topbar h1 { margin: 0 0 6px; font-size: 30px; letter-spacing: -0.04em; }
.topbar p { margin: 0; color: var(--muted); }
.search-panel, .panel, .workspace, .side-panel {
  background: rgba(255,255,255,.90); border: 1px solid var(--border); border-radius: 26px; box-shadow: var(--shadow);
}
.search-panel { padding: 20px; margin-bottom: 18px; }
.search-row { display: flex; gap: 12px; align-items: center; }
input, textarea, select {
  width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; background: white; color: var(--text); font: inherit;
  outline: none; transition: .14s;
}
input:focus, textarea:focus, select:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(37,99,235,.10); }
textarea.source-editor { min-height: 66vh; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; line-height: 1.6; }
.button {
  border: none; border-radius: 14px; padding: 11px 15px; font-weight: 750; cursor: pointer; white-space: nowrap;
  transition: .15s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.button.primary { background: var(--primary); color: white; }
.button.primary:hover { background: var(--primary-2); }
.button.ghost { background: #eef2ff; color: #1e40af; }
.button.ghost:hover { background: #dbeafe; }
.button:disabled { opacity: .45; cursor: not-allowed; }
.toggle-row { display: flex; gap: 18px; margin-top: 14px; color: var(--muted); }
.toggle-row label { display: flex; gap: 8px; align-items: center; }
.result-list { display: grid; gap: 12px; }
.result-card {
  display: block; background: rgba(255,255,255,.92); border: 1px solid var(--border); border-radius: 22px; padding: 18px 20px;
  box-shadow: 0 12px 28px rgba(15,23,42,.04); transition: .14s;
}
.result-card:hover { transform: translateY(-2px); border-color: #bfdbfe; box-shadow: 0 18px 40px rgba(37,99,235,.10); }
.result-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.result-id { margin-top: 4px; color: var(--primary); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
.result-card p { color: var(--muted); margin: 10px 0 0; line-height: 1.6; }
.badge {
  display: inline-flex; padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 750; color: #1d4ed8; background: #dbeafe;
}
.badge.muted { color: #475569; background: #e2e8f0; }
.badge.warning { color: #92400e; background: #fef3c7; }
.badge.ok { color: #166534; background: #dcfce7; }
.notice { padding: 14px 16px; border-radius: 18px; margin: 0 0 16px; border: 1px solid var(--border); background: white; }
.notice.ok { color: #166534; background: #f0fdf4; border-color: #bbf7d0; }
.notice.error { color: #991b1b; background: #fef2f2; border-color: #fecaca; }
.loading, .empty, .fatal {
  padding: 32px; border: 1px dashed #cbd5e1; border-radius: 24px; background: rgba(255,255,255,.7); color: var(--muted);
}
.fatal { max-width: 960px; margin: 8vh auto; color: var(--danger); }
.page-grid { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 18px; align-items: start; }
.workspace { padding: 22px; min-width: 0; }
.side-panel { padding: 20px; position: sticky; top: 24px; }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 18px; }
.markdown-view { line-height: 1.75; color: #1e293b; }
.markdown-view h1, .markdown-view h2, .markdown-view h3 { letter-spacing: -0.03em; }
.markdown-view a { color: var(--primary); font-weight: 750; }
.markdown-view p { margin: 12px 0; }
.markdown-view li { margin-left: 22px; }
.status-card, .suggestion, .info-card {
  padding: 14px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 12px;
}
.info-card { display: grid; gap: 6px; }
pre {
  white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 18px; padding: 16px; overflow: auto;
}
.graph-list { display: flex; flex-wrap: wrap; gap: 10px; }
.graph-node { border: 1px solid #bfdbfe; background: #eff6ff; color: #1d4ed8; padding: 8px 11px; border-radius: 999px; font-weight: 700; }
@media (max-width: 980px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .sidebar-note { position: static; margin-top: 18px; }
  .page-grid { grid-template-columns: 1fr; }
  .topbar { flex-direction: column; }
}

    </style>
  </head>
  <body>
    <div id="root">
      <main class="fatal">
        <h1>Wiki Workbench</h1>
        <p>前端正在启动。如果这里一直不变化，请打开浏览器控制台查看错误，或访问 /health 检查后端。</p>
      </main>
    </div>
    <script>
const ACTION_BASE = "/app/wiki/action";

const state = {
  query: "",
  mode: "normal",
  results: [],
  currentPageId: "",
  currentMarkdown: "",
  currentRendered: "",
  status: null,
  diagnosis: null,
  graph: null,
  loading: false,
  error: "",
  message: "",
};

const $ = (id) => document.getElementById(id);

window.addEventListener("error", (event) => showFatal(event.error || event.message));
window.addEventListener("unhandledrejection", (event) => showFatal(event.reason));

function showFatal(error) {
  const root = $("root") || document.body;
  root.innerHTML = `
    <main class="fatal">
      <h1>Wiki App 启动失败</h1>
      <pre>${escapeHtml(String(error?.stack || error || "未知错误"))}</pre>
    </main>`;
}

async function callAction(action, payload = {}) {
  const res = await fetch(`${ACTION_BASE}/${action}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.ok === false) {
    const message = data?.error?.message || data?.error || `Action 调用失败：${action}`;
    throw new Error(message);
  }
  return data.data;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function pageLink(pageId) {
  return `#/page/${encodeURIComponent(pageId)}`;
}

function renderShell(content) {
  const root = $("root");
  if (!root) throw new Error("index.html 缺少 #root 节点");
  root.innerHTML = `
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">W</div>
          <div>
            <strong>Wiki Workbench</strong>
            <span>单仓直连版</span>
          </div>
        </div>
        <nav>
          <a href="#/" data-nav="home">搜索</a>
          <a href="#/admin" data-nav="admin">诊断后台</a>
          <a href="#/graph" data-nav="graph">知识图谱</a>
          <a href="#/files" data-nav="files">文件更新</a>
          <a href="#/user-files" data-nav="user-files">用户文件建页</a>
          <a href="#/settings" data-nav="settings">系统设置</a>
        </nav>
        <div class="sidebar-note">
          <span>内部函数入口</span>
          <code>/app/wiki/action</code>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h1>${titleForRoute()}</h1>
            <p>前端同源请求 App Action，服务端直接调用 WikiHub / WikiWorkbench。</p>
          </div>
          <button class="button ghost" id="refreshIndexBtn">刷新索引</button>
        </header>
        <section id="content">${content}</section>
      </main>
    </div>`;

  const refreshBtn = $("refreshIndexBtn");
  if (refreshBtn) refreshBtn.onclick = refreshIndex;
  markActiveNav();
}

function markActiveNav() {
  const hash = location.hash || "#/";
  document.querySelectorAll("[data-nav]").forEach((el) => {
    const nav = el.getAttribute("data-nav");
    const active =
      (nav === "home" && (hash === "#/" || hash.startsWith("#/page/"))) ||
      (nav !== "home" && hash.startsWith(`#/${nav}`));
    el.classList.toggle("active", active);
  });
}

function titleForRoute() {
  const hash = location.hash || "#/";
  if (hash.startsWith("#/page/")) return "页面详情";
  if (hash.startsWith("#/admin")) return "诊断后台";
  if (hash.startsWith("#/graph")) return "知识图谱";
  if (hash.startsWith("#/files")) return "文件更新";
  if (hash.startsWith("#/user-files")) return "用户文件建页";
  if (hash.startsWith("#/settings")) return "系统设置";
  return "Wiki 检索";
}

function loadingView(text = "加载中...") {
  return `<div class="loading">${text}</div>`;
}

function emptyView(text = "暂无数据") {
  return `<div class="empty">${text}</div>`;
}

function notice() {
  return `
    ${state.error ? `<div class="notice error">${escapeHtml(state.error)}</div>` : ""}
    ${state.message ? `<div class="notice ok">${escapeHtml(state.message)}</div>` : ""}`;
}

async function refreshIndex() {
  state.error = "";
  state.message = "正在刷新索引...";
  renderCurrentRoute();
  try {
    const data = await callAction("wiki_refresh_index", { extract_graph: true });
    const nodes = data?.refresh?.nodes ?? data?.refresh?.refresh?.nodes ?? "";
    state.message = `索引刷新完成${nodes ? `：nodes=${nodes}` : ""}`;
    if ((location.hash || "#/") === "#/") await search();
    else renderCurrentRoute();
  } catch (error) {
    state.error = String(error.message || error);
    state.message = "";
    renderCurrentRoute();
  }
}

async function search() {
  state.loading = true;
  state.error = "";
  renderHome();
  try {
    const action = state.mode === "graph" ? "wiki_graph_enhanced_search" : "wiki_search";
    const data = await callAction(action, {
      query: state.query,
      limit: 30,
      include_disabled: false,
    });
    state.results = Array.isArray(data) ? data : (data?.items || []);
  } catch (error) {
    state.error = String(error.message || error);
  } finally {
    state.loading = false;
    renderHome();
  }
}

function renderHome() {
  const resultHtml = state.loading
    ? loadingView("正在检索 Wiki...")
    : state.results.length
      ? `<div class="result-list">${state.results.map(renderSearchItem).join("")}</div>`
      : emptyView("输入关键词搜索，或直接点击刷新索引后查看全部页面。");

  renderShell(`
    ${notice()}
    <div class="search-panel">
      <div class="search-row">
        <input id="searchInput" value="${escapeHtml(state.query)}" placeholder="搜索 Wiki 页面、工具、技能、页面历史..." />
        <button class="button primary" id="searchBtn">搜索</button>
      </div>
      <div class="toggle-row">
        <label><input type="radio" name="mode" value="normal" ${state.mode === "normal" ? "checked" : ""}/> 普通检索</label>
        <label><input type="radio" name="mode" value="graph" ${state.mode === "graph" ? "checked" : ""}/> 图谱增强</label>
      </div>
    </div>
    ${resultHtml}`);
  $("searchInput").oninput = (e) => (state.query = e.target.value);
  $("searchInput").onkeydown = (e) => { if (e.key === "Enter") search(); };
  $("searchBtn").onclick = search;
  document.querySelectorAll("input[name='mode']").forEach((el) => {
    el.onchange = (e) => { state.mode = e.target.value; search(); };
  });
}

function renderSearchItem(item) {
  const pageId = item.page_id || item.id || item.path || "";
  const title = item.title || pageId;
  const summary = item.summary || item.scope || "";
  const disabled = item.disabled ? `<span class="badge muted">禁用</span>` : "";
  const locked = item.locked ? `<span class="badge warning">锁定</span>` : "";
  const score = item.score !== undefined ? `<span class="badge">score ${item.score}</span>` : "";
  return `
    <a class="result-card" href="${pageLink(pageId)}">
      <div class="result-title">${escapeHtml(title)} ${disabled} ${locked} ${score}</div>
      <div class="result-id">${escapeHtml(pageId)}</div>
      <p>${escapeHtml(summary)}</p>
    </a>`;
}

async function renderPage(pageId) {
  state.currentPageId = pageId;
  renderShell(loadingView("正在读取页面..."));
  try {
    const [page, source, diagnosis] = await Promise.all([
      callAction("wiki_read_page", { page_id: pageId }),
      callAction("wiki_read_source", { page_id: pageId }),
      callAction("wiki_diagnose_page", { page_id: pageId }).catch((e) => ({ status: "warning", suggestions: [], error: String(e.message || e) })),
    ]);
    state.currentRendered = page.content || "";
    state.currentMarkdown = source.markdown || "";
    state.diagnosis = diagnosis;
    renderPageLoaded();
  } catch (error) {
    state.error = String(error.message || error);
    renderShell(`${notice()}${emptyView("页面读取失败。")}`);
  }
}

function renderPageLoaded(mode = "read") {
  const pageId = state.currentPageId;
  const diagnosis = state.diagnosis || {};
  const suggestions = diagnosis.suggestions || [];
  const body = mode === "source"
    ? `<textarea id="sourceEditor" class="source-editor">${escapeHtml(state.currentMarkdown)}</textarea>`
    : `<article class="markdown-view">${renderMarkdown(state.currentRendered || state.currentMarkdown)}</article>`;
  renderShell(`
    ${notice()}
    <div class="page-grid">
      <section class="workspace">
        <div class="toolbar">
          <button class="button ${mode === "read" ? "primary" : "ghost"}" id="readMode">阅读模式</button>
          <button class="button ${mode === "source" ? "primary" : "ghost"}" id="sourceMode">源码模式</button>
          <button class="button primary" id="saveDraft" ${mode !== "source" ? "disabled" : ""}>保存草稿</button>
          <a class="button ghost" href="#/versions/${encodeURIComponent(pageId)}">版本历史</a>
          <a class="button ghost" href="#/files/${encodeURIComponent(pageId)}">依赖文件</a>
        </div>
        <h2>${escapeHtml(pageId)}</h2>
        ${body}
      </section>
      <aside class="side-panel">
        <h3>页面诊断</h3>
        <div class="status-card">
          <span class="badge ${diagnosis.status === "healthy" ? "ok" : "warning"}">${escapeHtml(diagnosis.status || "unknown")}</span>
          <p>${diagnosis.error ? escapeHtml(diagnosis.error) : "诊断信息来自 WikiWorkbench。"}</p>
        </div>
        <h4>修复建议</h4>
        ${suggestions.length ? suggestions.map(renderSuggestion).join("") : emptyView("暂无建议")}
      </aside>
    </div>`);
  $("readMode").onclick = () => renderPageLoaded("read");
  $("sourceMode").onclick = () => renderPageLoaded("source");
  const save = $("saveDraft");
  if (save) save.onclick = saveDraft;
}

function renderSuggestion(item) {
  return `
    <div class="suggestion">
      <strong>${escapeHtml(item.title || item.action_id || "建议")}</strong>
      <p>${escapeHtml(item.description || "")}</p>
      ${item.enabled === false ? "" : `<button class="button ghost" onclick="applyFix('${escapeHtml(item.action_id || "")}')">执行修复</button>`}
    </div>`;
}

window.applyFix = async function(actionId) {
  try {
    const data = await callAction("wiki_apply_diagnosis_fix", {
      page_id: state.currentPageId,
      action_id: actionId,
      author: "wiki_app",
    });
    state.message = `修复动作已执行：${actionId}`;
    if (data?.result?.draft?.draft_id) state.message += `，草稿 ${data.result.draft.draft_id}`;
    await renderPage(state.currentPageId);
  } catch (error) {
    state.error = String(error.message || error);
    renderPageLoaded("read");
  }
};

async function saveDraft() {
  const editor = $("sourceEditor");
  if (!editor) return;
  try {
    const data = await callAction("wiki_save_draft", {
      page_id: state.currentPageId,
      markdown: editor.value,
      author: "wiki_app",
      reason: "前端源码模式保存草稿",
    });
    const draftId = data?.draft_id || data?.draft?.draft_id || "";
    state.message = draftId ? `草稿已保存：${draftId}` : "草稿已保存";
    renderPageLoaded("source");
  } catch (error) {
    state.error = String(error.message || error);
    renderPageLoaded("source");
  }
}

function renderMarkdown(text) {
  const escaped = escapeHtml(text || "");
  return escaped
    .replace(/^# (.*)$/gm, "<h1>$1</h1>")
    .replace(/^## (.*)$/gm, "<h2>$1</h2>")
    .replace(/^### (.*)$/gm, "<h3>$1</h3>")
    .replace(/^\- (.*)$/gm, "<li>$1</li>")
    .replace(/\n\n/g, "</p><p>")
    .replace(/\[\[([^|\\]]+)\|([^\\]]+)\]\]/g, (m, label, target) => `<a href="${pageLink(target)}">${label}</a>`)
    .replace(/\[\[([^\\]]+)\]\]/g, (m, target) => `<a href="${pageLink(target)}">${target}</a>`);
}

async function renderAdmin() {
  renderShell(`
    ${notice()}
    <div class="panel">
      <h2>诊断后台</h2>
      <p>输入页面 ID 后执行页面诊断或元结构检查。</p>
      <div class="search-row"><input id="diagPageId" placeholder="例如 tool/wiki/page_history" /><button id="diagBtn" class="button primary">诊断</button></div>
      <pre id="diagOutput"></pre>
    </div>`);
  $("diagBtn").onclick = async () => {
    try {
      const data = await callAction("wiki_diagnose_page", { page_id: $("diagPageId").value });
      $("diagOutput").textContent = JSON.stringify(data, null, 2);
    } catch (error) {
      $("diagOutput").textContent = String(error.message || error);
    }
  };
}

async function renderGraph() {
  renderShell(loadingView("正在抽取图谱..."));
  try {
    const data = await callAction("wiki_extract_knowledge_graph", { include_graph: true, write_store: true });
    const graph = data.graph || {};
    const nodes = graph.nodes || [];
    const triples = graph.triples || [];
    renderShell(`
      <div class="page-grid">
        <section class="workspace">
          <h2>知识图谱</h2>
          <p>节点 ${nodes.length} 个，三元组 ${triples.length} 条。</p>
          <div class="graph-list">${nodes.slice(0, 80).map(n => `<a href="${pageLink(n.id)}" class="graph-node">${escapeHtml(n.title || n.id)}</a>`).join("")}</div>
        </section>
        <aside class="side-panel"><h3>三元组样例</h3><pre>${escapeHtml(JSON.stringify(triples.slice(0, 30), null, 2))}</pre></aside>
      </div>`);
  } catch (error) {
    state.error = String(error.message || error);
    renderShell(`${notice()}${emptyView("图谱读取失败。")}`);
  }
}

function renderFiles(pageId = "") {
  renderShell(`
    ${notice()}
    <div class="panel">
      <h2>文件依赖更新</h2>
      <p>检查 wiki.md 同目录真实文件变化，并生成更新草稿。</p>
      <div class="search-row"><input id="filePageId" value="${escapeHtml(pageId)}" placeholder="页面 ID" /><button id="fileCheckBtn" class="button primary">检查依赖</button><button id="fileUpdateBtn" class="button ghost">差异化更新</button></div>
      <pre id="fileOutput"></pre>
    </div>`);
  $("fileCheckBtn").onclick = async () => {
    try { $("fileOutput").textContent = JSON.stringify(await callAction("wiki_page_file_status", { page_id: $("filePageId").value }), null, 2); }
    catch (e) { $("fileOutput").textContent = String(e.message || e); }
  };
  $("fileUpdateBtn").onclick = async () => {
    try { $("fileOutput").textContent = JSON.stringify(await callAction("wiki_update_system_page_from_files", { page_id: $("filePageId").value, mode: "diff", author: "wiki_app" }), null, 2); }
    catch (e) { $("fileOutput").textContent = String(e.message || e); }
  };
}

function renderUserFiles() {
  renderShell(`
    <div class="panel">
      <h2>用户文件建页</h2>
      <p>只面向用户文件目录，系统源码目录禁止自动建页。</p>
      <div class="search-row"><input id="userRoot" placeholder="例如 data/user_docs" /><button id="previewUserFiles" class="button primary">预览建页</button></div>
      <pre id="userFilesOutput"></pre>
    </div>`);
  $("previewUserFiles").onclick = async () => {
    try { $("userFilesOutput").textContent = JSON.stringify(await callAction("wiki_generate_user_folder_wikis", { root_path: $("userRoot").value, dry_run: true }), null, 2); }
    catch (e) { $("userFilesOutput").textContent = String(e.message || e); }
  };
}

function renderSettings() {
  renderShell(`
    <div class="panel">
      <h2>系统设置</h2>
      <p>当前版本为单仓直连模式，前端调用同源内部函数入口，不经过 MCP 工具层。</p>
      <div class="info-card"><strong>内部函数入口</strong><span>/app/wiki/action</span></div>
      <button class="button primary" id="statusBtn">连接诊断</button>
      <pre id="settingsOutput"></pre>
    </div>`);
  $("statusBtn").onclick = async () => {
    try { $("settingsOutput").textContent = JSON.stringify(await callAction("wiki_server_status", {}), null, 2); }
    catch (e) { $("settingsOutput").textContent = String(e.message || e); }
  };
}

async function renderVersions(pageId) {
  renderShell(loadingView("正在读取版本历史..."));
  try {
    const data = await callAction("wiki_page_history", { page_id: pageId, limit: 30 });
    const commits = data.commits || data.history || data || [];
    renderShell(`
      <div class="page-grid">
        <section class="workspace"><h2>版本历史</h2><p>${escapeHtml(pageId)}</p>
          <div class="result-list">${(Array.isArray(commits) ? commits : []).map(c => `<div class="result-card"><strong>${escapeHtml((c.commit || "").slice(0, 8))}</strong><p>${escapeHtml(c.message || "")}</p><span>${escapeHtml(c.date || "")}</span></div>`).join("")}</div>
        </section>
      </div>`);
  } catch (error) {
    state.error = String(error.message || error);
    renderShell(`${notice()}${emptyView("版本历史读取失败。")}`);
  }
}

function renderCurrentRoute() {
  const hash = location.hash || "#/";
  const decoded = (value) => decodeURIComponent(value || "");
  if (hash.startsWith("#/page/")) return renderPage(decoded(hash.slice("#/page/".length)));
  if (hash.startsWith("#/versions/")) return renderVersions(decoded(hash.slice("#/versions/".length)));
  if (hash.startsWith("#/files/")) return renderFiles(decoded(hash.slice("#/files/".length)));
  if (hash.startsWith("#/files")) return renderFiles("");
  if (hash.startsWith("#/admin")) return renderAdmin();
  if (hash.startsWith("#/graph")) return renderGraph();
  if (hash.startsWith("#/user-files")) return renderUserFiles();
  if (hash.startsWith("#/settings")) return renderSettings();
  return renderHome();
}

async function boot() {
  try {
    const status = await callAction("wiki_server_status", {});
    state.status = status;
    state.message = `已连接：catalog=${status.catalog_count ?? 0}`;
  } catch (error) {
    state.error = `后端连接失败：${String(error.message || error)}`;
  }
  renderCurrentRoute();
}

window.addEventListener("hashchange", renderCurrentRoute);
boot().catch(showFatal);

    </script>
  </body>
</html>
